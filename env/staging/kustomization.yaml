apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nginx-staging
resources:
- ../../base/nginx-deployment.yaml
patches:
- patch: |-
    - op: replace
      path: /metadata/namespace
      value: nginx-staging
  target:
    kind: Deployment
    name: nginx
- patch: |-
    - op: replace
      path: /metadata/namespace
      value: nginx-staging
  target:
    kind: Service
    name: nginx
images:
- name: nginx
  newTag: 1.25.0
